name: Check Missing Translation

on:
  pull_request:
    branches:
      - '*'

jobs:
  check-missing-translation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create directory for countryconfig
        run: mkdir -m 777 -p $HOME/countryconfig

      - name: Clone countryconfig and check if there any branch exists with the same name like current branch
        id: set_branch
        run: |
          cd $HOME/countryconfig
          git clone https://github.com/opencrvs/opencrvs-countryconfig.git
          cd opencrvs-countryconfig
          if git show-ref --verify --quiet "refs/remotes/origin/${{ github.head_ref }}"; then
            working_branch=${{ github.head_ref }}
          elif git show-ref --verify --quiet "refs/remotes/origin/${{ github.base_ref }}"; then
            working_branch=${{ github.base_ref }}
          else
            working_branch='develop'
          fi

          echo "Using branch $working_branch from countryconfig"
          echo "working_branch=$working_branch" >> $GITHUB_OUTPUT
          git checkout $working_branch

          # Sync countryconfig with base branch, so we get both the newest changes from the base branch and the changes from working branch
          echo "Syncing countryconfig branch '$working_branch' with base branch"

          # Unfortunately the merge requires user.name and email to be set here
          git config --local user.name "OpenCRVS Bot"
          git config --local user.email "bot@opencrvs.org"

          if git merge origin/${{ github.base_ref }} --no-commit --no-ff; then
            echo "Successfully synced countryconfig branch '$working_branch' with base branch '${{ github.base_ref }}'"
          else
            if git diff --name-only --diff-filter=U | grep -q "src/translations/client.csv"; then
              echo "Found merge conflicts in src/translations/client.csv, aborting merge"
              git merge --abort
            else
              echo "No conflicts in translations file, continuing"
            fi
          fi
          echo "countryconfig_path=$HOME/countryconfig/opencrvs-countryconfig" >> $GITHUB_OUTPUT

      - name: Setup Node.js from core nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install countryconfig dependencies
        working-directory: ${{ steps.set_branch.outputs.countryconfig_path }}
        run: yarn install

      - name: Check core-en.json is in sync
        run: |
          core_file="$GITHUB_WORKSPACE/packages/toolkit/dist/core-en.json"
          cc_file="${{ steps.set_branch.outputs.countryconfig_path }}/node_modules/@opencrvs/toolkit/dist/core-en.json"
          if ! diff -q "$core_file" "$cc_file" > /dev/null 2>&1; then
            echo "### Translation sync error" >> $GITHUB_STEP_SUMMARY
            echo "core-en.json in this core PR differs from the version installed in countryconfig." >> $GITHUB_STEP_SUMMARY
            echo "The countryconfig branch must install a version of \`@opencrvs/toolkit\` built from the same core changes before translations can be validated." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Validate translations
        working-directory: ${{ steps.set_branch.outputs.countryconfig_path }}
        run: yarn validate:translations:ci
