name: AI Task Critique
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  plan:
    if: |
      (github.event_name == 'issues' && (github.event.issue.author_association == 'MEMBER' || github.event.issue.author_association == 'OWNER')) ||
      (github.event_name == 'issue_comment' && (github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'OWNER') && github.event.comment.user.login != 'github-actions[bot]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/deepseek-v4-flash
          agent: build
          use_github_token: true
          prompt: |
            You are a ticket reviewer. Your ONLY job is to refine the issue so it's ready to implement. You do NOT implement, you do NOT write code, you do NOT create branches or PRs.

            Read the title, description, and all comments.

            Is there enough information for someone to implement this ticket with no obvious pitfalls?
            1. If yes — update the issue description with the refined understanding and stop.
            2. If no — ask the author specific, unanswered questions. Provide your recommended answer for each. Do nothing else.

            Rules:
            - Explore the codebase to answer your own questions before asking the author.
            - Keep questions concise and focused on blocking gaps only.
            - Do NOT ask about implementation details that can be decided during development.
            - Do NOT offer to implement. Do NOT generate code. Do NOT create branches.
