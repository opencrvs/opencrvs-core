name: Test v1.9 -> v2.0 Upgrade Script

on:
  pull_request:
  workflow_dispatch:
    inputs:
      countryconfig-branch:
        description: countryconfig branch name
        default: release-v1.9.11
        required: true
      ref:
        description: Commit SHA / branch / tag to checkout (optional)
        required: false

jobs:
  test-upgrade-script:
    runs-on: ubuntu-24.04
    env:
      COUNTRYCONFIG_BRANCH: ${{ github.event.inputs.countryconfig-branch || 'release-v1.9.11' }}
    steps:
      - name: Checkout opencrvs-core repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}
      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Install core dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: yarn install --frozen-lockfile
      - name: Build toolkit
        run: yarn build:all
        working-directory: packages/toolkit
      - name: Checkout the correct opencrvs-countryconfig branch
        run: |
          git clone -b ${{ env.COUNTRYCONFIG_BRANCH }} https://github.com/opencrvs/opencrvs-countryconfig.git
      - name: Install opencrvs-countryconfig dependencies
        working-directory: opencrvs-countryconfig
        run: yarn install
      - name: Link toolkit
        run: |
          cd packages/toolkit && yarn link
          cd ../../opencrvs-countryconfig && yarn link @opencrvs/toolkit
      - name: Run upgrade script on opencrvs-countryconfig
        run: |
          cd opencrvs-countryconfig
          yarn opencrvs upgrade
          rm -rf src/api/notification/testData.ts
      - name: Test opencrvs-countryconfig compilation
        run: yarn test:compilation
        working-directory: opencrvs-countryconfig
