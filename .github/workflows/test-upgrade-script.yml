name: Test upgrade script

on:
  pull_request:
  workflow_dispatch:
    inputs:
      farajaland:
        description: Farajaland branch name
        default: release-v1.9.13
        required: true

jobs:
  test-upgrade-script:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: yarn install --frozen-lockfile
      - name: Build toolkit
        run: yarn build
        working-directory: packages/toolkit
      - name: Checkout the correct opencrvs-farajaland branch
        run: |
          git clone -b ${{ github.event.inputs.farajaland }} https://github.com/opencrvs/opencrvs-farajaland.git
      - name: TODO
        run: |
          echo "TODO: Implement upgrade script"
          ls -a
          cd packages/toolkit
          ls -a
          ls -a dist
