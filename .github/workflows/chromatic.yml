name: Chromatic

on:
  pull_request:
    paths:
      - 'packages/client/**'

jobs:
  chromatic:
    name: Run chromatic visual tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checking out git repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Chromatic needs full git history for baseline comparison

      - name: Use Node.js from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Cache Node.js dependencies
        uses: actions/cache@v5
        with:
          path: |
            **/node_modules
            ~/.cache/yarn/v6
          key: node-${{ hashFiles('**/yarn.lock', 'packages/client/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: CI="" yarn install --frozen-lockfile

      - name: Build common package
        run: cd packages/commons && yarn build

      - name: Build components
        run: cd packages/components && yarn build

      - name: Build events router types
        run: cd packages/events && node_modules/.bin/tsc -p tsconfig.router.json

      - name: Run Chromatic
        run: yarn run chromatic
        working-directory: packages/client
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
