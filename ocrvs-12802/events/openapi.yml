                    - type: "null"
                requestId:
                  type: string
                type:
                  default: APPROVE_CORRECTION
                  type: string
                  const: APPROVE_CORRECTION
                content:
                  type: object
                  properties:
                    immediateCorrection:
                      type: boolean
              required:
                - transactionId
                - requestId
              additionalProperties: false
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDocument"
        "400": *a1
        "401": *a2
        "403": *a3
        "500": *a4
  /events/{eventId}/correction/reject:
