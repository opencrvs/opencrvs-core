                originalActionId:
                  type: string
                  format: uuid
                  pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                keepAssignment:
                  type: boolean
                keepAssignmentIfAccepted:
                  type: boolean
                keepAssignmentIfRejected:
                  type: boolean
                waitFor:
                  default: true
                  description: Whether action waits for the indexing before returning. Defaults to
                    true. Setting this to to false completes faster but might
                    lead to stale data in the client if the client tries to read
                    the event immediately after performing the action. Use with
                    care.
                  type: boolean
                createdAtLocation:
                  description: A valid office location ID. This is required for system users
                    performing actions. The provided location must be a
                    leaf-location, i.e. it must not have any children locations.
                  anyOf:
                    - type: string
                      format: uuid
                      pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                    - type: "null"
                requestId:
                  type: string
                type:
                  default: REJECT_CORRECTION
                  type: string
                  const: REJECT_CORRECTION
                content:
                  type: object
                  properties:
                    reason:
                      type: string
                      minLength: 1
                      description: Message describing the reason for rejecting or archiving the event.
                  required:
                    - reason
              required:
                - transactionId
                - requestId
                - content
              additionalProperties: false
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDocument"
        "400": *a1
        "401": *a2
        "403": *a3
        "500": *a4
  /events/search:
    post:
      operationId: event-search
      summary: Search for events
      tags:
        - Search
      security:
        - Authorization: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  $ref: "#/components/schemas/QueryType"
                limit:
                  default: 100
                  type: number
                offset:
                  default: 0
                  type: number
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                      direction:
                        default: asc
                        type: string
                        enum:
                          - asc
                          - desc
                    required:
                      - field
              required:
                - query
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/EventIndex"
                  total:
                    type: number
                required:
                  - results
                  - total
                additionalProperties: false
        "400": *a1
        "401": *a2
        "403": *a3
        "500": *a4
  /locations:
    get:
      operationId: locations-list
      summary: List locations
      description: Retrieve a list of locations based on provided filters.
      tags:
        - Locations
      security:
        - Authorization: []
      parameters:
        - in: query
          name: isActive
          schema:
            type: boolean
        - in: query
          name: locationIds
          schema:
            type: array
            items:
              type: string
              format: uuid
