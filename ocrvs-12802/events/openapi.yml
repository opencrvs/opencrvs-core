                    leaf-location, i.e. it must not have any children locations.
                  anyOf:
                    - type: string
                      format: uuid
                      pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                    - type: "null"
                type:
                  default: REQUEST_CORRECTION
                  type: string
                  const: REQUEST_CORRECTION
              required:
                - transactionId
              additionalProperties: false
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDocument"
        "400": *a1
        "401": *a2
        "403": *a3
        "500": *a4
  /events/{eventId}/correction/approve:
    post:
      operationId: event-actions-correction-approve-request
      summary: Approve correction for an event
      tags:
        - Events
      security:
        - Authorization: []
      parameters:
        - in: path
          name: eventId
          schema:
            type: string
            format: uuid
            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                transactionId:
                  type: string
                declaration:
                  default: {}
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties:
                    description: Value that matches exactly one of the possible schema types
