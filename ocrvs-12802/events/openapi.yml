                  result:
                    type: object
                    properties:
                      data:
                        type: object
                        properties:
                          json:
                            type: string
components:
  schemas:
    QueryType:
      type: object
      properties:
        type:
          anyOf:
            - type: string
              const: and
            - type: string
              const: or
          default: and
        clauses:
          minItems: 1
          type: array
          items:
            anyOf:
              - $ref: "#/components/schemas/QueryExpression"
              - $ref: "#/components/schemas/QueryType"
          default:
            - eventType: tennis-club-membership
              status:
                type: anyOf
                terms:
                  - CREATED
                  - NOTIFIED
                  - DECLARED
                  - REGISTERED
                  - ARCHIVED
              updatedAt:
                type: range
                gte: 2025-05-22
                lte: 2025-05-29
              data: {}
      required:
        - type
        - clauses
    QueryExpression:
      type: object
      properties:
        id:
          type: string
        eventType:
          type: string
        status:
          anyOf:
            - $ref: "#/components/schemas/AnyOfStatus"
            - $ref: "#/components/schemas/ExactStatus"
        createdAt:
          $ref: "#/components/schemas/DateCondition"
        updatedAt:
          $ref: "#/components/schemas/DateCondition"
        legalStatuses.DECLARED.createdAtLocation:
          anyOf:
            - $ref: "#/components/schemas/Within"
            - type: "null"
        legalStatuses.DECLARED.createdByRole:
          $ref: "#/components/schemas/AnyOf"
        legalStatuses.REGISTERED.acceptedAt:
          $ref: "#/components/schemas/DateCondition"
        legalStatuses.REGISTERED.createdAtLocation:
          anyOf:
            - $ref: "#/components/schemas/Within"
            - type: "null"
        legalStatuses.REGISTERED.createdByRole:
          $ref: "#/components/schemas/AnyOf"
        legalStatuses.REGISTERED.registrationNumber:
          $ref: "#/components/schemas/Exact"
        createdAtLocation:
          anyOf:
            - $ref: "#/components/schemas/Within"
            - $ref: "#/components/schemas/Exact"
        updatedAtLocation:
          anyOf:
            - $ref: "#/components/schemas/Within"
            - $ref: "#/components/schemas/Exact"
        assignedTo:
          $ref: "#/components/schemas/Exact"
        createdByUserType:
          $ref: "#/components/schemas/ExactUserType"
        updatedByUserRole:
          $ref: "#/components/schemas/Exact"
        createdBy:
          $ref: "#/components/schemas/Exact"
        updatedBy:
          $ref: "#/components/schemas/Exact"
        trackingId:
          $ref: "#/components/schemas/Exact"
        flags:
          $ref: "#/components/schemas/ContainsFlags"
        data:
          $ref: "#/components/schemas/QueryInput"
    AnyOfStatus:
      type: object
      properties:
        type:
          type: string
          const: anyOf
        terms:
          type: array
          items:
            type: string
            enum:
              - CREATED
              - NOTIFIED
              - DECLARED
              - REGISTERED
              - ARCHIVED
      required:
        - type
        - terms
    ExactStatus:
      type: object
      properties:
        type:
          type: string
          const: exact
        term:
          type: string
          enum:
            - CREATED
            - NOTIFIED
            - DECLARED
            - REGISTERED
            - ARCHIVED
      required:
        - type
        - term
    DateCondition:
      anyOf:
        - $ref: "#/components/schemas/ExactDate"
        - $ref: "#/components/schemas/RangeDate"
        - $ref: "#/components/schemas/TimePeriod"
    ExactDate:
      type: object
      properties:
        type:
          type: string
          const: exact
        term:
          anyOf:
            - type: string
              format: date
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))$
            - type: string
              format: date-time
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
      required:
        - type
        - term
    RangeDate:
      type: object
      properties:
        type:
          type: string
          const: range
        gte:
          anyOf:
            - type: string
              format: date
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))$
            - type: string
              format: date-time
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
        lte:
          anyOf:
            - type: string
              format: date
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))$
            - type: string
              format: date-time
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
      required:
        - type
        - gte
        - lte
    TimePeriod:
      type: object
      properties:
        type:
          type: string
          const: timePeriod
        term:
          type: string
          enum:
            - last7Days
            - last30Days
            - last90Days
            - last365Days
      required:
        - type
        - term
    Within:
      type: object
      properties:
        type:
          type: string
          const: within
        location:
          type: string
      required:
        - type
        - location
    AnyOf:
      type: object
      properties:
        type:
          type: string
          const: anyOf
        terms:
          type: array
          items:
            type: string
      required:
        - type
        - terms
    Exact:
      type: object
      properties:
        type:
          type: string
          const: exact
        term:
          type: string
      required:
        - type
        - term
    ExactUserType:
      type: object
      properties:
        type:
          type: string
          const: exact
        term:
          type: string
          enum:
            - user
            - system
      required:
        - type
        - term
    ContainsFlags:
      type: object
      properties:
        anyOf:
          type: array
          items:
            anyOf:
              - anyOf:
                  - type: string
                    pattern: ^(delete|create|notify|declare|register|edit|duplicate_detected|reject|mark_as_duplicate|mark_as_not_duplicate|archive|print_certificate|request_correction|reject_correction|approve_correction|read|assign|unassign|custom):(requested|accepted|rejected)$
                  - type: string
                    enum:
                      - incomplete
                      - rejected
                      - correction-requested
                      - potential-duplicate
                      - edit-in-progress
              - type: string
                description: Custom flag identifier defined by the country config.
        noneOf:
          type: array
          items:
            anyOf:
              - anyOf:
                  - type: string
                    pattern: ^(delete|create|notify|declare|register|edit|duplicate_detected|reject|mark_as_duplicate|mark_as_not_duplicate|archive|print_certificate|request_correction|reject_correction|approve_correction|read|assign|unassign|custom):(requested|accepted|rejected)$
                  - type: string
                    enum:
                      - incomplete
                      - rejected
                      - correction-requested
                      - potential-duplicate
                      - edit-in-progress
              - type: string
                description: Custom flag identifier defined by the country config.
    QueryInput:
      anyOf:
        - oneOf:
            - $ref: "#/components/schemas/Fuzzy"
            - $ref: "#/components/schemas/Exact"
            - $ref: "#/components/schemas/Range"
            - $ref: "#/components/schemas/Within"
            - $ref: "#/components/schemas/AnyOf"
          type: object
          discriminator:
            propertyName: type
            mapping:
              fuzzy: "#/components/schemas/Fuzzy"
              exact: "#/components/schemas/Exact"
              range: "#/components/schemas/Range"
              within: "#/components/schemas/Within"
              anyOf: "#/components/schemas/AnyOf"
        - type: object
          propertyNames:
            type: string
          additionalProperties:
            $ref: "#/components/schemas/QueryInput"
    Fuzzy:
      type: object
      properties:
        type:
          type: string
          const: fuzzy
        term:
          type: string
      required:
        - type
        - term
    Range:
      type: object
      properties:
        type:
          type: string
          const: range
        gte:
          type: string
        lte:
          type: string
      required:
        - type
        - gte
        - lte
    TranslationConfig:
      type: object
      properties:
        id:
          type: string
          description: The identifier of the translation referred in translation CSV files
        defaultMessage:
          type: string
          description: Default translation message
        description:
