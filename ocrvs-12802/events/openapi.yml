          description: Describe the translation for a translator to be able to identify it.
      required:
        - id
        - defaultMessage
        - description
      description: Translation configuration
    WorkqueueColumn:
      type: object
      properties:
        label:
          $ref: "#/components/schemas/TranslationConfig"
        value:
          type: object
          properties:
            $event:
              type: string
              enum:
                - id
                - type
                - status
                - createdAt
                - dateOfEvent
                - placeOfEvent
                - createdBy
                - createdByUserType
                - updatedByUserRole
                - createdAtLocation
                - updatedAtLocation
                - updatedAt
                - assignedTo
                - updatedBy
                - trackingId
                - legalStatuses
                - flags
                - title
                - outbox
          required:
            - $event
      required:
        - label
        - value
      description: Configuration for a single workqueue column. The value references
        an event metadata key (e.g. `dateOfEvent`, `status`, `trackingId`).
    error.BAD_REQUEST:
