      tags:
        - Attachments
      security:
        - bearerAuth:
            - attachment.upload
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                path:
                  type: string
                  description: Optional path in S3 where the file should be stored
                transactionId:
                  type: string
                  description: Transaction ID
                file:
                  type: string
                  format: binary
                  description: File to upload
              required:
