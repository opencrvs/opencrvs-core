openapi: 3.1.0
info:
  title: OpenCRVS API
  description: OpenCRVS Events API — for full documentation, see
    [https://documentation.opencrvs.org](https://documentation.opencrvs.org)
  version: 2.0.0
servers:
  - url: http://localhost:3000/api/events
paths:
  /events/reindex:
    post:
      operationId: event-reindex-trigger
      summary: Triggers reindexing of search, workqueues and notifies country config
      tags:
        - Events
      security:
        - Authorization: []
      parameters: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                waitForCompletion:
                  default: true
                  type: boolean
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema: {}
        "400": &a1
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error.BAD_REQUEST"
        "401": &a2
          description: Authorization not provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error.UNAUTHORIZED"
        "403": &a3
          description: Insufficient access
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error.FORBIDDEN"
        "500": &a4
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error.INTERNAL_SERVER_ERROR"
    get:
      operationId: event-reindex-status
      summary: Returns the status of current and past reindexing calls
      tags:
        - Events
      security:
        - Authorization: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                      pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                    timestamp:
                      type: string
                      format: date-time
                      pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                    status:
                      type: string
                      enum:
                        - running
                        - completed
                        - failed
                    progress:
                      type: object
                      properties:
                        processed:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                      required:
                        - processed
                      additionalProperties: false
                    error_message:
                      anyOf:
                        - type: string
                        - type: "null"
                    completed_at:
                      anyOf:
                        - type: string
                          format: date-time
                          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
                        - type: "null"
                  required:
                    - id
                    - timestamp
                    - status
                    - progress
                    - error_message
                    - completed_at
                  additionalProperties: false
        "400": *a1
        "401": *a2
        "403": *a3
        "404": &a5
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/error.NOT_FOUND"
        "500": *a4
  /config:
    get:
      operationId: event-config-get
      summary: List event configurations
      tags:
        - Events
      security:
        - Authorization: []
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventConfig"
        "401": *a2
        "403": *a3
        "500": *a4
  /events:
    post:
      operationId: event-create
      summary: Create event
      tags:
        - Events
      security:
        - Authorization: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                transactionId:
                  type: string
                type:
                  type: string
                createdAtLocation:
                  description: Location where the event occurred. Required for system users.
                  anyOf:
                    - type: string
                      format: uuid
                      pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                    - type: "null"
              required:
                - transactionId
                - type
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDocument"
        "400": *a1
        "401": *a2
        "403": *a3
        "500": *a4
  /events/{eventId}:
    get:
      operationId: event-get
      summary: Fetch full event document
      tags:
        - Events
      security:
        - Authorization: []
      parameters:
        - in: path
          name: eventId
          schema:
            type: string
            format: uuid
            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
          required: true
        - in: query
          name: customActionType
          schema:
            type: string
        - in: query
          name: waitFor
          schema:
            default: true
            description: Whether the action should wait for the event to be indexed before
              returning. Defaults to true. Setting this to false completes
              faster but might lead to stale data in the client if the client
              tries to read the event immediately after performing the action.
              Use with care.
            type: boolean
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDocument"
        "400": *a1
        "401": *a2
        "403": *a3
        "404": *a5
        "500": *a4
  /events/{eventId}/notify:
    post:
      operationId: event-actions-notify-request
      summary: Notify an event
      tags:
        - Events
      security:
        - Authorization: []
      parameters:
        - in: path
          name: eventId
          schema:
            type: string
            format: uuid
            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                transactionId:
                  type: string
                declaration:
                  default: {}
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties:
                    description: Value that matches exactly one of the possible schema types
                      (TextValue, DateValue, DateRangeFieldValue). The best
                      matching schema is chosen by priority.
                  description: Record of field-level changes made by an action. Supports partial
                    updates and nullable values.
                annotation:
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties:
                    description: Value that matches exactly one of the possible schema types
                      (TextValue, DateValue, DateRangeFieldValue). The best
                      matching schema is chosen by priority.
                  description: Record of field-level changes made by an action. Supports partial
                    updates and nullable values.
                originalActionId:
                  type: string
                  format: uuid
                  pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                keepAssignment:
                  type: boolean
                keepAssignmentIfAccepted:
                  type: boolean
                keepAssignmentIfRejected:
                  type: boolean
                waitFor:
                  default: true
                  description: Whether action waits for the indexing before returning. Defaults to
                    true. Setting this to to false completes faster but might
                    lead to stale data in the client if the client tries to read
                    the event immediately after performing the action. Use with
                    care.
                  type: boolean
                createdAtLocation:
                  description: A valid office location ID. This is required for system users
                    performing actions. The provided location must be a
                    leaf-location, i.e. it must not have any children locations.
                  anyOf:
                    - type: string
                      format: uuid
                      pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
                    - type: "null"
                type:
                  default: NOTIFY
                  type: string
                  const: NOTIFY
              required:
                - transactionId
              additionalProperties: false
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDocument"
        "400": *a1
        "401": *a2
        "403": *a3
        "500": *a4
  /events/notify:
    post:
      operationId: event-actions-createAndNotify-request
      summary: Create an event and immediately notify (single request, system clients
