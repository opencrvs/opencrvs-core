volumes:
  metricbeat:
services:
  mongo1:
    image: mongo:4.4
    restart: unless-stopped

  redis:
    image: redis:8
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.16.4
    restart: unless-stopped
    environment:
      - discovery.type=single-node

  influxdb:
    image: influxdb:1.8.10
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:RELEASE.2025-06-13T11-33-47Z
    restart: unless-stopped
