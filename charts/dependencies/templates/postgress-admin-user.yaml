{{/*
Create postgres Admin user (superuser)
*/}}
{{/* Prevent secret mutation between helm upgrades */}}
{{- $secret := lookup "v1" "Secret" .Release.Namespace .Values.postgres.admin_user_secret_name }}
{{- if not $secret }}
  {{- $admin_user := "postgres" }}
  {{- $admin_password := default (randAlphaNum 16) .Values.postgres.admin_user_password }}
  {{- if .Values.postgres.use_default_credentials }}
    {{- $admin_user = "postgres" }}
    {{- $admin_password = "postgres" }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.postgres.admin_user_secret_name }}
  annotations:
    "helm.sh/resource-policy": keep
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
type: Opaque
data:
  POSTGRES_USER: {{ $admin_user | b64enc }}
  POSTGRES_PASSWORD: {{ $admin_password | b64enc }}
{{- end }}
