{{- if .Values.monitoring.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kibana-route
spec:
  entryPoints:
  {{- if .Values.ingress.ssl_enabled }}
    - websecure
  {{- end }}
  {{- if or .Values.ingress.tls_resolver (not .Values.ingress.ssl_enabled) }}
    - web
  {{- end }}
  routes:
  - match: 'Host(`{{ include "render-external-subdomain" (dict "service_name" "kibana" "Values" .Values) }}`)'
    kind: Rule
    services:
    - name: kibana
      namespace: {{ .Release.Namespace }}
      port: 5601
  {{- if .Values.ingress.tls_resolver }}
  tls:
    certResolver: {{ .Values.ingress.tls_resolver }}
  {{- else if .Values.ingress.tls_secret_name }}
  tls:
    secretName: {{ .Values.ingress.tls_secret_name }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: kibana
spec:
  type: ClusterIP
  ports:
    - port: 5601
      targetPort: 5601
      protocol: TCP
      name: http
  selector:
    app: kibana
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      initContainers:
        - name: elasticsearch-on-deploy
          command: ["/scripts/setup.sh"]
          image: "bash"
          env:
            - name: ELASTICSEARCH_HOST
              value: {{ .Values.elasticsearch.host }}
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.elasticsearch.admin_user_secret_name }}
                  key: ELASTIC_PASSWORD
            - name: KIBANA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.kibana.users_secret }}
                  key: KIBANA_USERNAME
            - name: KIBANA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.kibana.users_secret }}
                  key: KIBANA_PASSWORD
            - name: METRICBEAT_ELASTIC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.elasticsearch.users_secret }}
                  key: METRICBEAT_ELASTIC_USERNAME
            - name: METRICBEAT_ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.elasticsearch.users_secret }}
                  key: METRICBEAT_ELASTIC_PASSWORD
            - name: APM_ELASTIC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.elasticsearch.users_secret }}
                  key: APM_ELASTIC_USERNAME
            - name: APM_ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.elasticsearch.users_secret }}
                  key: APM_ELASTIC_PASSWORD
            - name: KIBANA_SYSTEM_ELASTIC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.elasticsearch.users_secret }}
                  key: KIBANA_SYSTEM_ELASTIC_USERNAME
            - name: KIBANA_SYSTEM_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.elasticsearch.users_secret }}
                  key: KIBANA_SYSTEM_ELASTIC_PASSWORD
          volumeMounts:
            - mountPath: /scripts
              name: elasticsearch-scripts
      containers:
        - name: kibana
          image: {{ .Values.kibana.image }}
          env:
            - name: PUBLIC_BASE_URL
              value: {{ include "render-external-url" (dict "service_name" "kibana" "Values" .Values) }}
            # TODO: When users are not enabled
            - name: ELASTICSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.elasticsearch.users_secret }}
                  key: KIBANA_SYSTEM_ELASTIC_USERNAME
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.elasticsearch.users_secret }}
                  key: KIBANA_SYSTEM_ELASTIC_PASSWORD
            - name: KIBANA_SYSTEM_ELASTIC_URL
              {{- $elastic_host := default (printf "elasticsearch-0.elasticsearch.%s.svc.cluster.local" $.Release.Namespace) $.Values.elasticsearch.host }}
              value: http://{{ $elastic_host }}:9200
            - name: KIBANA_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  key: KIBANA_ENCRYPTION_KEY
                  name: kibana-encryption-secret
          ports:
            - containerPort: 5601
          volumeMounts:
            - name: kibana-config
              mountPath: /usr/share/kibana/config/kibana.yml
              subPath: kibana.yml
      volumes:
        - name: kibana-config
          configMap:
            name: kibana-config
        - name: elasticsearch-scripts
          configMap:
            name: elasticsearch-scripts
            defaultMode: 0755
{{- end }}