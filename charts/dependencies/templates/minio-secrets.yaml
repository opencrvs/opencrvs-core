
{{- if not .Values.minio.use_default_credentials }}
{{/* Prevent secret mutation between helm upgrades */}}
{{- $secret_name := "minio-opencrvs-users" }}
{{- $secret := lookup "v1" "Secret" .Release.Namespace $secret_name }}
{{- if not $secret }}
{{- $username := randAlphaNum 16 }}
{{- $password := randAlphaNum 32 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secret_name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
type: Opaque
data:
  MINIO_ACCESS_KEY: {{ $username | b64enc }}
  MINIO_ROOT_PASSWORD: {{ $password | b64enc }}
  MINIO_ROOT_USER: {{ $username | b64enc }}
  MINIO_SECRET_KEY: {{ $password | b64enc }}
{{- end }}
{{- end }}