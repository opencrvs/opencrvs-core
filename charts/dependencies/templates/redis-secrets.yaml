
{{- if or (eq .Values.redis.auth_mode "acl") (eq .Values.redis.auth_mode "password") }}
{{/* Prevent secret mutation between helm upgrades */}}
{{- $secret_name := "redis-opencrvs-users" }}
{{- $secret := lookup "v1" "Secret" .Release.Namespace $secret_name }}
{{- if not $secret }}

{{- $secrets := dict }}

{{ $password := randAlphaNum 32 }}
{{- if $.Values.chart_dev_mode }}
{{- $password = "redispassword" }}
{{- end }}
{{- $_ := set $secrets "DEFAULT_REDIS_PASSWORD" $password }}
{{- $acl := printf "user default on >%s ~* +@all\n" ($secrets.DEFAULT_REDIS_PASSWORD) }}

{{- if eq .Values.redis.auth_mode "acl" }}
{{- range .Values.redis.auth_users }}
  {{- $username := printf "%s_REDIS_USERNAME" . }}
  {{- $password := randAlphaNum 32 }}
  {{- if $.Values.chart_dev_mode }}
    {{- $username = . | lower }}
    {{- $password = . | lower }}
  {{- end }}
  {{- $_ := set $secrets (printf "%s_REDIS_USERNAME" .) $username }}
  {{- $_ := set $secrets (printf "%s_REDIS_PASSWORD" .) $password }}
{{- end }}

{{- /* Build ACL file content */}}
{{- range .Values.redis.auth_users }}
  {{- $username := index $secrets (printf "%s_REDIS_USERNAME" .) }}
  {{- $password := index $secrets (printf "%s_REDIS_PASSWORD" .) }}
  {{- $acl = printf "%suser %s on >%s ~* +@all\n" $acl $username $password }}
{{- end }}
{{- end }}

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-opencrvs-acl
  annotations:
    "helm.sh/resource-policy": keep
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
type: Opaque
data:
  users.acl: {{ $acl | b64enc }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secret_name }}
  annotations:
    "helm.sh/resource-policy": keep
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
type: Opaque
data:
  {{- range $key, $val := $secrets }}
  {{ $key }}: {{ $val | b64enc }}
  {{- end }}

{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-opencrvs-conf
data:
  redis.conf: |
    bind 0.0.0.0
    protected-mode yes
    port 6379

    # path to ACL file (from the Secret mount)
    aclfile /usr/local/etc/redis/users.acl
{{- end }}