{{- if .Values.monitoring.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: filebeat
  labels:
    app: filebeat
spec:
  selector:
    matchLabels:
      app: filebeat
  template:
    metadata:
      labels:
        app: filebeat
    spec:
      serviceAccountName: filebeat
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: wait-kibana
          image: curlimages/curl
          command: ["sh", "-c"]
          args:
            - |
              for i in $(seq 1 30); do
                curl -sSf http://kibana.{{ .Release.Namespace }}.svc.cluster.local:5601 && exit 0
                echo "Waiting for kibana..."
                sleep 2
              done
              echo "Kibana did not become available" >&2
              exit 1
      containers:
      - name: filebeat
        securityContext:
          runAsUser: 0
          privileged: false
        image: {{ .Values.filebeat.image }}
        args: [
          "-c", "/etc/filebeat.yml",
          "-e"
        ]
        env:
          # Elasticsearch integration
          - name: ELASTICSEARCH_HOST
            {{- $elastic_host := default (printf "elasticsearch-0.elasticsearch.%s.svc.cluster.local" $.Release.Namespace) $.Values.elasticsearch.host }}
            value: http://{{ $elastic_host }}:9200
          - name: ELASTICSEARCH_USERNAME
            value: 'elastic'
          - name: ELASTICSEARCH_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.elasticsearch.admin_user_secret_name }}
                key: ELASTIC_PASSWORD
          # Kibana integration
          - name: KIBANA_HOST
            value: http://kibana.{{ .Release.Namespace }}.svc.cluster.local:5601
        resources:
          limits:
            memory: 400Mi
          requests:
            memory: 100Mi
        volumeMounts:
          - name: filebeat-config
            mountPath: /etc/filebeat.yml
            subPath: filebeat.yml
          - name: filebeat-ilm-config
            mountPath: /usr/share/filebeat/rollover-policy.json
            subPath: filebeat-rollover-policy.json
          - name: varlog
            mountPath: /var/log
      volumes:
        - name: filebeat-config
          configMap:
            name: {{ .Values.filebeat.custom_config_configmap | default "filebeat-config" }}
        - name: filebeat-ilm-config
          configMap:
            name: {{ .Values.filebeat.custom_ilm_configmap | default "filebeat-ilm-config" }}
        - name: varlog
          hostPath:
            path: /var/log
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: filebeat
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: filebeat
rules:
  - apiGroups: [""]
    resources:
      - pods
      - namespaces
      - nodes
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - replicasets
      - statefulsets
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: filebeat
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: filebeat
subjects:
  - kind: ServiceAccount
    name: filebeat
    namespace: {{ .Release.Namespace }}
{{- end }}