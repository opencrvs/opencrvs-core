{{ if .Values.elasticsearch.enabled }}
{{- $storageType := default .Values.storage_type .Values.elasticsearch.storage_type | default "pvc" }}
{{- if eq $storageType "pvc" }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app: elasticsearch
  name: elasticsearch
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ default "5Gi" .Values.elasticsearch.data_storage_size }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: elasticsearch
  name: elasticsearch
spec:
  clusterIP: None
  ports:
    - name: '9200'
      port: 9200
      targetPort: 9200
    - name: '9300'
      port: 9300
      targetPort: 9300
  selector:
    app: elasticsearch

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: elasticsearch
  name: elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  serviceName: 'elasticsearch'
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
    {{- if .Values.priority_class.enabled }}
      priorityClassName: {{ .Values.priority_class.name }}
    {{- end }}
    {{- $node_selector := default .Values.node_selector .Values.elasticsearch.node_selector }}
    {{- if $node_selector }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
            {{- range $k, $v := $node_selector }}
              - key: {{ $k }}
                operator: In
                values:
                - {{ $v }}
            {{- end }}
      {{- end }}
      initContainers:
        # Change ownership to elasticsearch user and group
        - name: volume-permission-fix
          image: busybox
          command:
            - chown
            - -R
            - "1000:0"
            - /usr/share/elasticsearch/data
            - /data/backups/elasticsearch
          volumeMounts:
            - name: elasticsearch
              mountPath: /usr/share/elasticsearch/data
            - mountPath: /data/backups/elasticsearch
              name: elasticsearch-backup
      containers:
        - env:
            # FIXME: Make fields configurable
            - name: ES_JAVA_OPTS
              value: -Xms2048m -Xmx8192m
            - name: cluster.routing.allocation.disk.threshold_enabled
              value: 'false'
            - name: discovery.type
              value: single-node
            - name: path.repo
              value: /data/backups/elasticsearch
          {{- if not .Values.elasticsearch.use_default_credentials }}
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.elasticsearch.admin_user_secret_name }}
                  key: ELASTIC_PASSWORD
            - name: xpack.security.enabled
              value: 'true'
          {{- else }}
            - name: xpack.security.enabled
              value: 'false'
          {{- end }}
          {{- if or .Values.elasticsearch.secrets .Values.elasticsearch.env .Values.env }}
          {{- include "render-env-vars" (dict "service_name" "elasticsearch" "Values" .Values) }}
          {{- end }}
          image: {{ .Values.elasticsearch.image }}
          name: elasticsearch
          {{ include "resources-helper" (dict "service_name" "elasticsearch" "Values" .Values) | indent 10 }}
          ports:
            - containerPort: 9200
              protocol: TCP
            - containerPort: 9300
              protocol: TCP
          volumeMounts:
            - mountPath: /usr/share/elasticsearch/data
              name: elasticsearch
            - mountPath: /data/backups/elasticsearch
              name: elasticsearch-backup
      restartPolicy: Always
      volumes:
        - name: elasticsearch-backup
          emptyDir: {}
        - name: elasticsearch
      {{- if eq $storageType "pvc" }}
          persistentVolumeClaim:
            claimName: elasticsearch
      {{- else if eq $storageType "host_path" }}
          hostPath:
            path: {{ .Values.elasticsearch.host_data_path | default "/data/elasticsearch" }}
            type: DirectoryOrCreate
      {{- end }}
{{- end }}