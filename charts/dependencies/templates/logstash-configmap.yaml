{{- if .Values.monitoring.enabled }}
apiVersion: v1
data:
{{- range $path, $file := .Files.Glob "files/logstash/*" }}
    {{ base $path }}: |
{{ toString $file | indent 8 }}
{{- end }}
kind: ConfigMap
metadata:
  labels:
    app: logstash
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
  name: logstash-configmap
{{- end }}
