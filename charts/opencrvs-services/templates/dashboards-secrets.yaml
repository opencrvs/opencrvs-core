
{{- if not .Values.dashboards.use_default_credentials }}
{{/* Prevent secret mutation between helm upgrades */}}
{{- $secret_name := "dashboards-admin-user" }}
{{- $secret := lookup "v1" "Secret" .Release.Namespace $secret_name }}
{{- if not $secret }}
{{- $password := randAlphaNum 32 }}
{{- $email := printf "%s@opencrvs.org" (randAlphaNum 10 | lower) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secret_name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/resource-policy": keep
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "1"
type: Opaque
data:
  OPENCRVS_METABASE_ADMIN_EMAIL: {{ $email | b64enc }}
  OPENCRVS_METABASE_ADMIN_PASSWORD: {{ $password | b64enc }}
{{- end }}
{{- end }}
