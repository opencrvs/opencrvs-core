# SystemType determines the scopes that will be assigned to the system.
# Gateway converts type to scopes before calling the integrations service.
enum SystemType {
  HEALTH
  RECORD_SEARCH
}

# Result returned when creating a new integration client.
# clientSecret is only shown once at creation time.
type RegisterSystemResult {
  clientId: ID!
  clientSecret: String!
  shaSecret: String!
}

input SystemInput {
  name: String!
  type: SystemType!
}

type Mutation {
  registerSystem(system: SystemInput): RegisterSystemResult
}
