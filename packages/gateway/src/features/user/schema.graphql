input UserIdentifierInput {
  use: String # -> .use
  system: String # -> .system
  value: String # -> .system
}

type UserIdentifier { # -> identifier
  use: String # -> .use
  system: String # -> .system
  value: String # -> .system
}

input SignatureInput {
  data: String!
  type: String
}

enum Status {
  active
  deactivated
  pending
  disabled
}

# Create user form does not ask email, username
input UserInput {
  id: ID
  name: [HumanNameInput!]!
  identifier: [UserIdentifierInput]
  username: String
  mobile: String
  password: String
  status: Status
  role: String
  email: String
  fullHonorificName: String
  primaryOfficeId: String
  device: String
  signature: SignatureInput
}

type Signature {
  data: String
  type: String
}

type LocalRegistrar {
  name: [HumanName]!
  role: String
  signature: Signature
}

type Avatar {
  type: String!
  data: String!
}

# This should be replaced in #2277
type System {
  name: String!
}

# @TODO: Is it actually so that there are users without primaryOffice?
# Fields type, underInvestigation and localRegistrar
# are optional when a Local System Admin creates new user.
type User {
  id: ID!
  name: [HumanName!]! # -> .name
  username: String
  mobile: String
  role: String!
  email: String
  fullHonorificName: String
  status: Status!
  primaryOfficeId: String!
  signature: Signature
  avatar: String
}

type SearchUserResult {
  results: [User]
  totalItems: Int
}

input SecurityQuestionAnswer {
  questionKey: String
  answer: String
}

type VerifyPasswordResult {
  mobile: String
  scrope: [String]
  status: String
  username: String
  id: String
}

input AvatarInput {
  type: String!
  data: String!
}

type Query {
  getUser(userId: String!): User
  getUserByMobile(mobile: String!): User
  getUserByEmail(email: String!): User
  searchUsers(
    username: String
    mobile: String
    email: String
    status: String
    primaryOfficeId: String
    locationId: String
    count: Int
    skip: Int
    sort: String
  ): SearchUserResult
  verifyPasswordById(id: String!, password: String!): VerifyPasswordResult
}

type Mutation {
  createOrUpdateUser(user: UserInput!): User!
  activateUser(
    userId: String!
    password: String!
    securityQNAs: [SecurityQuestionAnswer]!
  ): String
  changePassword(
    userId: String!
    existingPassword: String!
    password: String!
  ): String
  changePhone(
    userId: String!
    phoneNumber: String!
    nonce: String!
    verifyCode: String!
  ): String
  changeEmail(
    userId: String!
    email: String!
    nonce: String!
    verifyCode: String!
  ): String
  changeAvatar(userId: String!, avatar: AvatarInput!): Avatar
  auditUser(
    userId: String!
    action: String!
    reason: String!
    comment: String
  ): String
  resendInvite(userId: String!): String
  usernameReminder(userId: String!): String
  resetPasswordInvite(userId: String!): String
}
