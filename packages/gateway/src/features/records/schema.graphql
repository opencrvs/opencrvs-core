input FieldInput {
  id: String!
  value: FieldValue!
}

input RecordInput {
  type: String!
  fields: [FieldInput!]!
}

type Field {
  id: String!
  value: FieldValue!
}

type Record {
  id: ID!
  event: String!
  fields: [Field!]!
}

type CreateRecordResponse {
  id: ID!
}

type Query {
  getRecord(recordId: ID!): Record!
}

type Mutation {
  createRecord(recordInput: RecordInput!): CreateRecordResponse!
}
