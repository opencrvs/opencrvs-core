type Query {
  getUser(userId: String!): User
  getUserByMobile(mobile: String!): User
  getUserByEmail(email: String!): User
  searchUsers(
    username: String
    mobile: String
    email: String
    status: String
    primaryOfficeId: String
    locationId: String
    count: Int
    skip: Int
    sort: String
  ): SearchUserResult
  verifyPasswordById(id: String!, password: String!): VerifyPasswordResult
}

type Mutation {
  createOrUpdateUser(user: UserInput!): User!
  activateUser(
    userId: String!
    password: String!
    securityQNAs: [SecurityQuestionAnswer]!
  ): String
  changePassword(
    userId: String!
    existingPassword: String!
    password: String!
  ): String
  changePhone(
    userId: String!
    phoneNumber: String!
    nonce: String!
    verifyCode: String!
  ): String
  changeEmail(
    userId: String!
    email: String!
    nonce: String!
    verifyCode: String!
  ): String
  changeAvatar(userId: String!, avatar: AvatarInput!): Avatar
  auditUser(
    userId: String!
    action: String!
    reason: String!
    comment: String
  ): String
  resendInvite(userId: String!): String
  usernameReminder(userId: String!): String
  resetPasswordInvite(userId: String!): String
}

type Dummy {
  dummy: String!
}

type User {
  id: ID!
  name: [HumanName!]!
  username: String
  mobile: String
  role: String!
  email: String
  fullHonorificName: String
  status: Status!
  primaryOfficeId: String!
  signature: Signature
  avatar: String
}

type SearchUserResult {
  results: [User]
  totalItems: Int
}

type VerifyPasswordResult {
  mobile: String
  scrope: [String]
  status: String
  username: String
  id: String
}

input UserInput {
  id: ID
  name: [HumanNameInput!]!
  identifier: [UserIdentifierInput]
  username: String
  mobile: String
  password: String
  status: Status
  role: String
  email: String
  fullHonorificName: String
  primaryOfficeId: String
  device: String
  signature: SignatureInput
}

input SecurityQuestionAnswer {
  questionKey: String
  answer: String
}

type Avatar {
  type: String!
  data: String!
}

input AvatarInput {
  type: String!
  data: String!
}

type HumanName {
  use: String
  firstNames: String
  middleName: String
  familyName: String
  marriedLastName: String
}

enum Status {
  active
  deactivated
  pending
  disabled
}

type Signature {
  data: String
  type: String
}

input HumanNameInput {
  use: String
  firstNames: String
  middleName: String
  familyName: String
  marriedLastName: String
}

input UserIdentifierInput {
  use: String
  system: String
  value: String
}

input SignatureInput {
  data: String!
  type: String
}
