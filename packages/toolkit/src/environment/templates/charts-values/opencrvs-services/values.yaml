##################################################################################
# DON'T MODIFY THIS FILE
# File was generated by "yarn environment:init"
# File will be overwritten on next run of this script
# Please use values.override.yaml to modify helm chart behavior
# make sure your custom changes doesn't conflict with values.yaml
##################################################################################

########################################################################################
# Initial configuration file for OpenCRVS installation
########################################################################################
# Some properties are not defined in this file and should be provided as key/value at
# installation time:
# - hostname: valid DNS name for opencrvs
# - countryconfig.image.name: Countryconfig image repository
# - countryconfig.image.tag: Countryconfig image tag
environment_type: {{environment_type}}

hpa:
  enabled: false

env:
  APN_SERVICE_URL: "http://apm-server.opencrvs-deps-{{env}}.svc.cluster.local:8200"
  MINIO_BUCKET: ocrvs

influxdb:
  host: influxdb-0.influxdb.opencrvs-deps-{{env}}.svc.cluster.local

elasticsearch:
  auth_mode: auto
  host: elasticsearch.opencrvs-deps-{{env}}.svc.cluster.local

minio:
  auth_mode: use_secret
  host: minio-0.minio.opencrvs-deps-{{env}}.svc.cluster.local

mongodb:
  auth_mode: auto
  host: mongodb-0.mongodb.opencrvs-deps-{{env}}.svc.cluster.local

redis:
  auth_mode: use_secret
  host: redis-0.redis.opencrvs-deps-{{env}}.svc.cluster.local

postgres:
  auth_mode: auto
  host: postgres-0.postgres.opencrvs-deps-{{env}}.svc.cluster.local

platform:
  imagePullSecrets:
    # Default value for credentials created while yarn environment:init
    - name: dockerhub-credentials


auth:
  env:
    TWO_FA_ENABLED: {{two_fa_enabled}}

events:
  env:
    TWO_FA_ENABLED: {{two_fa_enabled}}

countryconfig:
  secrets:
    smtp-config:
      - ALERT_EMAIL
      - SENDER_EMAIL_ADDRESS
      - SMTP_HOST
      - SMTP_PASSWORD
      - SMTP_PORT
      - SMTP_SECURE
      - SMTP_USERNAME

dashboards:
  use_default_credentials: false
  enabled: true

on_restore_cronjob:
  enabled: {{restore_enabled}}