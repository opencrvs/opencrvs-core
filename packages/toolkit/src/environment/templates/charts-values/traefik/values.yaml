##################################################################################
# DON'T MODIFY THIS FILE
# File was generated by "yarn environment:init"
# File will be overwritten on next run of this script
# Please use values.override.yaml to modify helm chart behavior
# make sure your custom changes doesn't conflict with values.yaml
##################################################################################

# Overwriting https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml
namespaceOverride: "traefik"
logs:
  general:
    # "TRACE", "DEBUG", "INFO", "WARN", "ERROR", "FATAL", "PANIC"
    level: "INFO"
    # format: "common" # For local environment
    format: "json" # For server environment
  access:
    # -- To enable access logs
    enabled: true
    format: "json"

ingressRoute:
  dashboard:
    enabled: false

# Be explicit that we only use CRDs, not ingress/gw support
providers: 
  kubernetesCRD:
    enabled: true
  kubernetesIngress:
    enabled: false
  kubernetesGateway:
    enabled: false

service:
  enabled: true
  single: false
  type: NodePort

ports:
  web:
    port: 8000
    hostPort: 80
    protocol: TCP
    nodePort: 30080
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    port: 8443
    hostPort: 443
    protocol: TCP
    nodePort: 30443
    {{#if lets_encrypt}}
    http:
      tls:
        enabled: true
        certResolver: letsencrypt
    {{/if}}


{{#if lets_encrypt}}
# 👇 Adjust this section if needed
certificatesResolvers:
  letsencrypt:
    acme:
      tlsChallenge: false
      httpChallenge:
        entryPoint: web
      # 👇 Provide admin email address
      email: admin@opencrvs.org
      # Storage for certificates:
      storage: /certificates/acme.json
      # NOTE: Sometimes Let's Encrypt hit production SSL certificate issuing limits
      #       If you are having issues, switch to staging
      # Staging server
      # caServer: https://acme-staging-v02.api.letsencrypt.org/directory
      # Production server
      caServer: https://acme-v02.api.letsencrypt.org/directory

additionalVolumeMounts:
    - name: acme
      mountPath: /certificates
{{/if}}
{{#if static_ssl}}
certificatesResolvers: {}

# 👇 Custom TLS configuration
tlsStore:
  default:
    defaultCertificate:
      # Check documentation how to create secret with static SSL certificate
      secretName: traefik-cert
{{/if}}

deployment:
  hostNetwork: true
  {{#if static_ssl}}
  kind: DaemonSet
  {{/if}}
  {{#if lets_encrypt}}
  additionalVolumes:
    - name: acme
      hostPath:
        path: /data/traefik
  {{/if}}

# If you need to run traefik on all cluster nodes
# Add this line to traefik/values.override.yaml
# nodeSelector: {}
nodeSelector:
  traefik-role: ingress
