# Default: storage_type: host_path
# host_path option is backward compatible with Docker Swarm,
# configured to use sub-directories within /data folder
# For new installations feel free to remove storage_type
storage_type: host_path

# All datastores are placed on first node (master1) for backward compatibility
# with Docker Swarm.
# For new installations feel free to remove node_selector
node_selector:
  role: data1

minio:
  use_default_credentials: false
  {{#if restore_enabled}}
  restore:
    type: {{restore_type}}
  {{/if}}
  {{#if backup_enabled}}
  backup:
    type: {{backup_type}}
  {{/if}}

elasticsearch:
  use_default_credentials: false

mongodb:
  use_default_credentials: false

postgres:
  use_default_credentials: false
  {{#if restore_enabled}}
  restore:
    type: {{restore_type}}
  {{/if}}
  {{#if backup_enabled}}
  backup:
    type: {{backup_type}}
  {{/if}}

redis:
  auth_mode: acl

monitoring:
  enabled: true

elastalert:
  env:
    NOTIFICATION_TYPE: email
  secrets:
    smtp-config:
      - ALERT_EMAIL
      - SENDER_EMAIL_ADDRESS
      - SMTP_HOST
      - SMTP_PASSWORD
      - SMTP_PORT
      - SMTP_SECURE
      - SMTP_USERNAME

# Backup configuration
backup:
  enabled: {{backup_enabled}}
  schedule: "0 1 * * *"
  backup_server_secret: backup-server-ssh-credentials
  backup_server_dir: /home/backup/{{env}}


# Restore configuration
restore:
  enabled: {{restore_enabled}}
  schedule: "0 0 * * *"
  backup_server_secret: backup-server-ssh-credentials
  backup_server_dir: /home/backup/{{restore_environment_name}}
  backup_encryption_secret: restore-encryption-secret