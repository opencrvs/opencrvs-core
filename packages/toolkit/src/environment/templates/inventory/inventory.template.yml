##################################################################################
# DON'T MODIFY THIS FILE
# File was generated by "yarn environment:init"
# File will be overwritten on next run of this script
# Please use values.override.yaml to modify helm chart behavior
# make sure your custom changes doesn't conflict with values.yaml
##################################################################################
all:
  vars:

    # Domain/IP address for remote access to your cluster API
    # Domain/IP address will be added as main endpoint to your ~/.kube/config
    # - If you are behind VPN, use private IP address
    # - If your server is exposed (not recommeded), use public IP address
    # - If you would like to run kubectl commands from the remote server, leave this field empty
    # kube_api_endpoint: ''

    # IMPORTANT: If master VM has multiple ethernet interfaces, put private IP address at kube_api_host
    # kube_api_host: 10.10.10.10
    kube_api_host: {{kube_api_host}}

    # Default ansible provision user, keep as is
    ansible_user: provision
    # single_node:
    # For development/qa/testing/staging keep true
    # For production keep false
    # Defaults production configuration:
    # - master node
    # - 2 worker nodes
    single_node: {{single_node}}
    ################################################################
    # DON'T MODIFY THIS SECTION BY HANDS
    # Use: yarn environment:users
    ################################################################
    # users: Add as many users as you wish
    # Configuration example
    # - name: <login>
    #   ssh_keys:
    #     - <public ssh key 1>
    #     - <public ssh key 2>
    #   state: present
    #   role: admin
    # Allowed roles:
    # - operator: grant read only access to OS and full access to kubernetes cluster
    # - admin: grant full access to OS and kubernetes cluster
    # Allowed states:
    # - present: user is allowed to login
    # - absent: user account is disabled
    # users: []
    {{#if users}}
    users:
    {{#each users as |user|}}
      - name: {{user.name}}
        ssh_keys:
        {{#each user.ssh_keys as |key| }}
          - {{{key}}}
        {{/each}}
        state: {{user.state}}
        role: {{user.role}}
    {{/each}}
    {{else}}
    users: []
    {{/if}}

  children:
    master:
      hosts:
        # Replace master with value returned by command: hostname
        master:
          # Keep values (ansible_host, ansible_connection) as is
          # Ansible is executed on master node
          ansible_host: localhost
          ansible_connection: local
          labels:
            # traefik-role label is used to identify where to deploy traefik
            traefik-role: ingress
            # By default all datastores are deployed to node with role data1
            role: data1
  {{#if kube_worker_nodes}}
    # Workers section is optional, for single node cluster feel free to remove this section
    # section can be added later
    # more workers can be added later as well
    workers:
      hosts:
    {{#each kube_worker_nodes as |host idx|}}
        worker{{idx}}:
          ansible_host: {{host}}
          labels:
            # Labels have index + 2 for backward compatibility with existing swarm setup
            role: data{{data_label_idx idx}}
    {{/each}}
  {{/if}}
  {{#if backup_host}}
    # backup section is optional, feel free to remove if backups are not enabled
    # section can be added later
    backup:
      hosts:
        backup0:
          ansible_host: {{backup_host}}
  {{/if}}
